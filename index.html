<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Día de la madre - iCo Medios</title>

    <meta http-equiv="refresh" content="180" />

    <!-- FUENTE -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@1,800&display=swap" rel="stylesheet" />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #ffffff;
      }

      .contenedor {
        position: relative;

        width: 768px;
        height: 768px;

        overflow: hidden;

        transform-origin: 0 0;

        background: #000;
      }

      /* VIDEO */
      #fondoVideo {
        position: absolute;

        inset: 0;

        width: 100%;
        height: 100%;

        object-fit: cover;

        z-index: 0;
      }

      /* CONTENEDOR GENERAL */
      #nombres {
        position: absolute;

        inset: 0;

        z-index: 5;
      }

      /* NOMBRE MAMÁ */
      .nombre {
        position: absolute;

        top: 396px;
        left: 150px;

        width: 500px;

        text-align: center;

        color: #0000ec;

        font-size: 33px;

        font-family: "Open Sans", sans-serif;

        font-style: italic;

        font-weight: 800;

        opacity: 0;

        transition: opacity 0.8s ease;
      }

      /* DICHO */
      .dicho {
        position: absolute;

        top: 192px;
        left: 134px;

        width: 551px;

        text-align: center;

        color: #0000ec;

        font-size: 44px;

        line-height: 1.2;

        font-family: "Open Sans", sans-serif;

        font-style: italic;

        font-weight: 800;

        opacity: 0;

        transition: opacity 0.8s ease;
      }

      .mostrar {
        opacity: 1;
      }
    </style>
  </head>

  <body>
    <div class="contenedor">
      <!-- VIDEO -->
      <video autoplay muted loop playsinline id="fondoVideo">
        <source src="fondo.mp4" type="video/mp4" />
      </video>

      <!-- TEXTOS -->
      <div id="nombres">
        <div class="nombre"></div>

        <div class="dicho"></div>
      </div>
    </div>

    <script>
      /* ESCALA FIJA */
      function escalarPantalla() {
        const escalaX = window.innerWidth / 768;
        const escalaY = window.innerHeight / 768;

        const escala = Math.min(escalaX, escalaY);

        document.querySelector(".contenedor").style.transform = `scale(${escala})`;
      }

      window.addEventListener("resize", escalarPantalla);

      escalarPantalla();

      const url =
        "https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnR9sKMc4V_LT0YpJPKgHrTJdw0886LZpZCfFNDpmgqn_PWAkG04bVDbX9kRZgvbFEqfoXH3m59Qk4I-xa_oOHjfdYnsQVZEZGK-I4CHcEfwd6hcV7aFEe_RcBuls2LkfXbRrxyQ5Z0Ga_0Q4tYTUKnD148IiUGF0u1wOkY2LsiW_5PKXaTSE84s06IXxbrC52CGNkw2ZrPMqT1vigNBDcUHE2P6ld_vTvwYRaKn4lj6FagP0VZjSNexLfGeTOgNPvK-AFa0CvCvWO7wVAbZb8yo0mX2MQ&lib=MLNAcr3Jke4q8WCYQeQbKPKeEHa1C_Htb";

      const elNombre = document.querySelector(".nombre");

      const elDicho = document.querySelector(".dicho");

      fetch(url)
        .then((response) => response.json())

        .then((data) => {
          console.log(data);

          if (!data || data.length === 0) {
            elNombre.textContent = "";

            elDicho.textContent = "No hay mensajes aprobados";

            elDicho.classList.add("mostrar");

            return;
          }

          let index = Math.floor(Math.random() * data.length);

          function mostrarMensaje() {
            const item = data[index];

            console.log(item);

            elNombre.classList.remove("mostrar");
            elDicho.classList.remove("mostrar");

            setTimeout(() => {
              elNombre.textContent = item.papa ? item.papa.toUpperCase() : "--";

              elDicho.textContent = item.mensaje ? `"${item.mensaje}"` : "";

              elNombre.classList.add("mostrar");
              elDicho.classList.add("mostrar");
            }, 300);

            index++;

            if (index >= data.length) {
              index = 0;
            }
          }

          mostrarMensaje();

          setInterval(mostrarMensaje, 5000);
        })

        .catch((error) => {
          console.error(error);

          elDicho.textContent = "Error cargando mensajes";

          elDicho.classList.add("mostrar");
        });
    </script>
  </body>
</html>
