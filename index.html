<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Día de la madre - iCo Medios</title>

  <meta http-equiv="refresh" content="180">

  <!-- FUENTE -->
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@1,800&display=swap" rel="stylesheet">

  <style>

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    .contenedor {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* VIDEO */
    #fondoVideo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* CONTENEDOR TEXTO */
   /* CONTENEDOR GENERAL */
#nombres {
  position: absolute;
  inset: 0;
  z-index: 5;
}

/* NOMBRE MAMÁ */
.nombre {

  position: absolute;

  top: 456px;   /* ← mueve vertical */
  left: -337px;  /* ← mueve horizontal */

  width: 2000px;

  text-align: center;

  color: #FFDBCC;

  font-size: 44px;

  font-family: "Open Sans", sans-serif;

  font-style: italic;

  font-weight: 800;

  opacity: 0;

  transition: opacity .8s ease;
}

/* DICHO */
.dicho {

  position: absolute;

  top: 319px;   /* ← mueve vertical */
  left: 112px;  /* ← mueve horizontal */

  width: 800px;

  text-align: center;

  color: #F3574A;

  font-size: 53px;

  line-height: 1.2;

  font-family: "Open Sans", sans-serif;

  font-style: italic;

  font-weight: 800;

  opacity: 0;

  transition: opacity .8s ease;
}
    .mostrar {
      opacity: 1;
    }

  </style>
</head>

<body>

  <div class="contenedor">

    <!-- VIDEO -->
    <video autoplay muted loop playsinline id="fondoVideo">
      <source src="fondo.mp4" type="video/mp4">
    </video>

    <!-- TEXTOS -->
    <div id="nombres">

      <div class="nombre"></div>

      <div class="dicho"></div>

    </div>

  </div>

  <script>

    const url =
      "https://script.google.com/macros/s/AKfycbwJNwjEI0QjntRwNEl3PlPf-IC5Dd15R6dSlcaRtkgOpNljXK77EKLikm1W3PGZkjS5jA/exec";

    const elNombre =
      document.querySelector(".nombre");

    const elDicho =
      document.querySelector(".dicho");

    fetch(url)

      .then(response => response.json())

      .then(data => {

        console.log(data);

        if (!data || data.length === 0) {

          elNombre.textContent = "";

          elDicho.textContent =
            "No hay mensajes aprobados";

          elDicho.classList.add("mostrar");

          return;
        }

        let index = 0;

        function mostrarMensaje() {

          const item = data[index];

          console.log(item);

          elNombre.classList.remove("mostrar");
          elDicho.classList.remove("mostrar");

          setTimeout(() => {

            /* IMPORTANTE:
               ESTE CÓDIGO USA:
               item.nombre
               item.deseo1

               porque seguramente tu Apps Script
               está devolviendo esos nombres.
            */

            elNombre.textContent =
  item.mama
  ? item.mama.toUpperCase()
  : "--";

elDicho.textContent =
  item.dicho
  ? `"${item.dicho}"`
  : "";

            elNombre.classList.add("mostrar");
            elDicho.classList.add("mostrar");

          }, 300);

          index++;

          if (index >= data.length) {
            index = 0;
          }
        }

        mostrarMensaje();

        setInterval(mostrarMensaje, 5000);

      })

      .catch(error => {

        console.error(error);

        elDicho.textContent =
          "Error cargando mensajes";

        elDicho.classList.add("mostrar");

      });

  </script>

</body>
</html>
